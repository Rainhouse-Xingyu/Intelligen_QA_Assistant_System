spring.application.name=qasystem
spring.config.import=optional:file:${user.dir}/config/application-secrets.properties

# MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${MYSQL_URL:jdbc:mysql://8.130.76.85:3306/llm_qa_sy?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}

# MyBatis-Plus
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.id-type=auto

# Knowledge Base
knowledge.upload-dir=uploads/kb

# Data Statistics
stat.hot-question.cron=0 0/30 * * * ?

# Local AI Models
ai.models.base-path=/opt/aige-models/
ai.models.qwen-cleaner-path=${ai.models.base-path}Qwen3-0.6B
ai.models.qwen-generator-path=${ai.models.base-path}Qwen3.5-4B
ai.models.embedding-path=${ai.models.base-path}bge-small-zh-v1.5
ai.models.reranker-path=${ai.models.base-path}bge-reranker-large
ai.models.intent-classifier-path=${ai.models.base-path}chinese-macbert-base

# Vector Search
vector.search.dimension=768
vector.search.top-candidates=20
vector.search.top-results=3
vector.search.strong-hit-threshold=0.85
vector.search.weak-hit-threshold=0.70
milvus.endpoint=https://in03-1488090144e62c9.serverless.aws-eu-central-1.cloud.zilliz.com
milvus.api-key=${MILVUS_API_KEY:}
milvus.collection-name=knowledge_vector

# Redis
spring.data.redis.host=8.130.76.85
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.password=${REDIS_PASSWORD:}

# Wechat MP Configuration
wx.mp.app-id=wx1234567890abcdef
wx.mp.secret=your_wechat_app_secret
wx.mp.token=your_wechat_token
wx.mp.aes-key=your_wechat_aes_key

# Coze API (Module 2.1)
coze.api.token=${COZE_API_TOKEN:}
coze.bot.id=
coze.workflow.api.url=https://api.coze.cn/v1/workflow/run
coze.workflow.inquiry-intent-recognition.id=7642303573099675684
coze.workflow.unknown-business-exception.id=7643309248310673443
coze.workflow.custom-learning-resources.id=7644189104666247178
