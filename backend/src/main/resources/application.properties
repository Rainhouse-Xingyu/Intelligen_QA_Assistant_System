spring.application.name=qasystem
server.port=${SERVER_PORT:8081}
spring.config.import=optional:file:${user.dir}/config/application-secrets.properties,optional:file:${user.dir}/backend/config/application-secrets.properties

# MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${MYSQL_URL:jdbc:mysql://8.130.76.85:3306/llm_qa_sy?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}

# MyBatis-Plus
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.id-type=auto

# Knowledge Base
knowledge.upload-dir=${KNOWLEDGE_UPLOAD_DIR:uploads/kb}

# Data Statistics
stat.hot-question.cron=0 0/30 * * * ?

# Volcengine Speech
volcengine.speech.app-id=${VOLCENGINE_SPEECH_APP_ID:}
volcengine.speech.access-token=${VOLCENGINE_SPEECH_ACCESS_TOKEN:}
volcengine.speech.secret-key=${VOLCENGINE_SPEECH_SECRET_KEY:}
volcengine.speech.asr.endpoint=https://openspeech.bytedance.com/api/v3/auc/bigmodel/recognize/flash
volcengine.speech.asr.resource-id=${VOLCENGINE_ASR_RESOURCE_ID:volc.bigasr.auc_turbo}
volcengine.speech.tts.endpoint=https://openspeech.bytedance.com/api/v3/tts/unidirectional/sse
volcengine.speech.tts.resource-id=${VOLCENGINE_TTS_RESOURCE_ID:seed-tts-2.0}
volcengine.speech.tts.speaker=${VOLCENGINE_TTS_SPEAKER:BV001_streaming}
volcengine.speech.tts.output-dir=${TTS_OUTPUT_DIR:uploads/audio}
volcengine.speech.tts.public-path=/media/audio

# Local AI Models
ai.models.base-path=/opt/aige-models/
ai.models.qwen-cleaner-path=${ai.models.base-path}Qwen3-0.6B
ai.models.qwen-generator-path=${ai.models.base-path}Qwen2.5-1.5B-Instruct
ai.models.embedding-path=${ai.models.base-path}bge-base-zh-v1.5
ai.models.reranker-path=${ai.models.base-path}bge-reranker-large
ai.models.intent-classifier-path=${ai.models.base-path}chinese-macbert-base
ai.models.local-service.enabled=true
ai.models.local-service.base-url=${LOCAL_MODEL_SERVICE_URL:http://127.0.0.1:18080}
ai.models.local-service.timeout-ms=600000
ai.models.deepseek.enabled=${DEEPSEEK_ENABLED:false}
ai.models.deepseek.api-key=${DEEPSEEK_API_KEY:}
ai.models.deepseek.base-url=${DEEPSEEK_BASE_URL:https://api.deepseek.com/chat/completions}
ai.models.deepseek.model=${DEEPSEEK_MODEL:deepseek-reasoner}
ai.models.deepseek.timeout-ms=${DEEPSEEK_TIMEOUT_MS:120000}
ai.models.deepseek.max-tokens=${DEEPSEEK_MAX_TOKENS:1200}

# Vector Search
vector.search.dimension=768
vector.search.top-candidates=20
vector.search.top-results=3
vector.search.strong-hit-threshold=0.85
# 这个弱命中阈值可以根据实际情况调整，过高可能导致没有结果返回，过低可能返回不相关的结果
vector.search.weak-hit-threshold=0.50
milvus.endpoint=${MILVUS_ENDPOINT:http://localhost:19530}
milvus.api-key=${MILVUS_API_KEY:}
milvus.database-name=${MILVUS_DATABASE_NAME:}
milvus.collection-name=${MILVUS_COLLECTION_NAME:knowledge_question_vector}
milvus.field.id=id
milvus.field.embedding=embedding
milvus.field.module-type=module_type
milvus.field.question=question
milvus.field.knowledge-id=knowledge_id
milvus.field.category-l1-id=category_l1_id
milvus.field.category-l2-id=category_l2_id
milvus.field.category-l3-id=category_l3_id
milvus.field.category-path=category_path
milvus.field.status=status

# Redis
spring.data.redis.host=${REDIS_HOST:8.130.76.85}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.password=${REDIS_PASSWORD:}

# Wechat MP Configuration
wx.mp.app-id=wx1234567890abcdef
wx.mp.secret=your_wechat_app_secret
wx.mp.token=your_wechat_token
wx.mp.aes-key=your_wechat_aes_key

# Coze API (Module 2.1)
coze.api.token=${COZE_API_TOKEN:}
coze.bot.id=
coze.workflow.api.url=https://api.coze.cn/v1/workflow/run
coze.workflow.inquiry-intent-recognition.id=7642303573099675684
coze.workflow.unknown-business-exception.id=7643309248310673443
coze.workflow.custom-learning-resources.id=7644189104666247178
coze.workflow.psychological-counseling.id=7644210479727935528
