spring.application.name=qasystem

# MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/llm_qa_sy?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456

# MyBatis-Plus
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.id-type=auto

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0

# Wechat MP Configuration
wx.mp.app-id=wx1234567890abcdef
wx.mp.secret=your_wechat_app_secret
wx.mp.token=your_wechat_token
wx.mp.aes-key=your_wechat_aes_key
